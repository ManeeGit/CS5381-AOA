project:
  name: Evolve-Pacman
  seed: 42
  max_generations: 10
  population_size: 8
  top_k: 3
  mutation_rate: 0.35
  cache_dir: ./data/cache

llm:
  # LOCAL LLM via Ollama (no internet or API key required)
  # Make sure Ollama is running: `ollama serve`
  # Pull a model first:  `ollama pull qwen2.5-coder:7b`
  provider: ollama                     # Options: "ollama" | "local" | "openai" | "gemini"
  model_name: qwen2.5-coder:7b         # For ollama: any pulled model name
  ollama_host: http://localhost:11434  # Ollama API endpoint
  # For remote providers set:
  #   provider: openai
  #   model_name: gpt-3.5-turbo
  #   export LLM_API_KEY="sk-..."

pacman:
  enabled: true
  # Path to UC Berkeley Pacman project root (contains pacman.py, game.py, etc.)
  root_path: ./third_party/pacman
  # Agent template that we will mutate/refine
  base_agent_path: ./third_party/pacman/myAgents.py
  # Command template to run pacman for evaluation
  # {root} will be replaced with root_path, {agent} with agent name, {layout} with layout name
  command: "python {root}/pacman.py -p {agent} -l {layout} -n 3 -q"
  layout: mediumMaze

matrix:
  enabled: true
  size: 3
  samples: 5
  max_ops: 60

pseudocode:
  enabled: true
  # Fitness weight for each dimension — must sum to 1.0 (UI auto-normalises)
  w_correctness: 0.4    # Fraction of test cases sorted correctly
  w_runtime: 0.2        # Inverse execution time (faster = higher score)
  w_length: 0.2         # Code conciseness (shorter = higher score)
  w_readability: 0.2    # Comment density + identifier quality
  samples: 10           # Random test-case arrays per evaluation
  max_length: 800       # Characters threshold for length scoring
  max_time_s: 1.0       # Seconds cap for runtime scoring

ui:
  mode: streamlit
